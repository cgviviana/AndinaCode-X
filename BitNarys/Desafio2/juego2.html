<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Captura de Datos - Desafío 1</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Orbitron', sans-serif;
      color: #00ffff;
      background: black;
    }

    #startScreen, #storyScreen, #gameScreen {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #startScreen {
      background: black;
      z-index: 10;
    }

    #storyScreen {
      background: rgba(0,0,0,0.9);
      display: none;
      z-index: 9;
    }

    #gameScreen {
      background: url('celeste.jpg') no-repeat center center;
      background-size: cover;
      display: none;
      z-index: 5;
      overflow: hidden;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff;
    }

    input {
      font-size: 20px;
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: none;
      outline: none;
      text-align: center;
    }

    button {
      font-size: 24px;
      padding: 15px 40px;
      background: rgba(0, 255, 255, 0.2);
      border: 2px solid #00ffff;
      color: #00ffff;
      cursor: pointer;
      border-radius: 10px;
      text-shadow: 0 0 5px #00ffff;
      transition: all 0.3s ease;
    }

    button:hover {
      background: rgba(0, 255, 255, 0.4);
      box-shadow: 0 0 20px #00ffff;
    }

    .panel {
      background: rgba(0,0,0,0.8);
      border: 2px solid #00ffff;
      border-radius: 10px;
      padding: 20px;
      max-width: 800px;
      box-shadow: 0 0 20px #00ffff;
      text-align: justify;
      color: #00ffff;
    }

    .panel h2 {
      text-align: center;
    }

    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 18px;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 10px;
      border: 2px solid #00ffff;
      text-shadow: 0 0 5px #00ffff;
      display: none;
      z-index: 6;
    }

    #hudTitle {
      font-size: 20px;
      margin-bottom: 5px;
    }

    #clock {
      font-size: 16px;
      margin-bottom: 10px;
    }

    #livesBar {
      margin-top: 10px;
      height: 20px;
      width: 100px;
      background: #111;
      border: 1px solid #00ffff;
    }

    #livesFill {
      height: 100%;
      width: 100%;
      background: #00ffff;
      transition: width 0.3s ease;
    }

    #icon {
      position: absolute;
      width: 80px;
      height: 80px;
      background-size: contain;
      background-repeat: no-repeat;
      display: none;
      z-index: 5;
    }

    #crosshair {
      position: absolute;
      width: 40px;
      height: 40px;
      pointer-events: none;
      z-index: 8;
    }

    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: #00ffff;
      box-shadow: 0 0 10px #00ffff;
    }

    #crosshair::before {
      left: 50%;
      top: 0;
      width: 2px;
      height: 100%;
      transform: translateX(-50%);
    }

    #crosshair::after {
      top: 50%;
      left: 0;
      width: 100%;
      height: 2px;
      transform: translateY(-50%);
    }

    #restartButton {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 16px;
      padding: 8px 16px;
      background: rgba(0, 255, 255, 0.2);
      border: 2px solid #00ffff;
      color: #00ffff;
      cursor: pointer;
      border-radius: 8px;
      text-shadow: 0 0 5px #00ffff;
      display: none;
      z-index: 7;
    }

    #restartButton:hover {
      background: rgba(0, 255, 255, 0.4);
      box-shadow: 0 0 20px #00ffff;
    }

    .smallButton {
      font-size: 18px;
      padding: 12px 32px;
      margin-top: 60px;
    }

    #missionComplete {
      display: none;
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      padding: 20px;
      border: 2px solid #00ffff;
      border-radius: 10px;
      color: #00ffff;
      text-align: center;
      z-index: 9;
    }
  </style>
</head>
<body>

<!-- Pantalla de Bienvenida -->
<div id="startScreen">
  <h1>BIENVENIDOS</h1>
  <input type="text" id="playerName" placeholder="Ingresa tu nombre">
  <button id="startButton">START</button>
</div>

<!-- Pantalla de Historia -->
<div id="storyScreen">
  <div class="panel">
    <h2 id="storyTitle">MISIÓN: CAPTURA DE DATOS</h2>
    <p id="storyText">Captura los datos estructurados con la tecla ESPACIO y elimina los no estructurados con la tecla ENTER. Apunta con la mira (mover con flechas). ¡Buena suerte!</p>
    <button id="beginButton" class="smallButton">Iniciar Desafío</button>
  </div>
</div>

<!-- Pantalla del Juego -->
<div id="gameScreen">
  <div id="hud">
    <div id="hudTitle">Desafío 1 - Jugador: <span id="playerDisplayName"></span></div>
    <div id="clock"></div>
    <div>Puntos: <span id="points">0</span></div>
    <div id="livesBar"><div id="livesFill"></div></div>
  </div>
  <button id="restartButton">Reiniciar</button>
  <div id="icon"></div>
  <div id="crosshair"></div>
</div>

<!-- Misión completada -->
<div id="missionComplete">
  <h2>MISIÓN COMPLETADA</h2>
  <button onclick="location.href='nivel2.html'">Siguiente Nivel</button>
</div>

<!-- Sonidos -->
<audio id="successSound" src="success.mp3"></audio>
<audio id="errorSound" src="error.mp3"></audio>

<script>
const startButton = document.getElementById('startButton');
const storyScreen = document.getElementById('storyScreen');
const beginButton = document.getElementById('beginButton');
const startScreen = document.getElementById('startScreen');
const gameScreen = document.getElementById('gameScreen');
const hud = document.getElementById('hud');
const playerNameInput = document.getElementById('playerName');
const playerDisplayName = document.getElementById('playerDisplayName');
const restartButton = document.getElementById('restartButton');
const icon = document.getElementById('icon');
const successSound = document.getElementById('successSound');
const errorSound = document.getElementById('errorSound');
const crosshair = document.getElementById('crosshair');

let points = 0;
let lives = 3;
let iconActive = false;
let gameInterval;
let currentIconType = '';
let crosshairX = window.innerWidth / 2 - 20;
let crosshairY = window.innerHeight / 2 - 20;
let pendientesEstructurados = [];
let pendientesNoEstructurados = [];

const icons = [
  { img: 'calendario.png', type: 'estructurado' },
  { img: 'lista.png', type: 'estructurado' },
  { img: 'grabaciones.png', type: 'noestructurado' },
  { img: 'foto.png', type: 'noestructurado' },
  { img: 'conversaciones.png', type: 'noestructurado' }
];

function updateClock() {
  const now = new Date();
  const hours = String(now.getHours()).padStart(2,'0');
  const minutes = String(now.getMinutes()).padStart(2,'0');
  const seconds = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
}
setInterval(updateClock, 1000);

startButton.addEventListener('click', () => {
  const playerName = playerNameInput.value.trim();
  if (playerName === "") {
    alert('Por favor ingresa tu nombre.');
    return;
  }
  playerDisplayName.textContent = playerName;
  document.getElementById('storyTitle').textContent = `Bienvenido Almirante ${playerName}`;
  startScreen.style.display = 'none';
  storyScreen.style.display = 'flex';
});

beginButton.addEventListener('click', () => {
  storyScreen.style.display = 'none';
  gameScreen.style.display = 'block';
  hud.style.display = 'block';
  restartButton.style.display = 'block';
  points = 0;
  lives = 3;
  updateLivesBar();
  document.getElementById('points').textContent = points;
  crosshairX = window.innerWidth / 2 - 20;
  crosshairY = window.innerHeight / 2 - 20;
  updateCrosshairPosition();
  pendientesEstructurados = icons.filter(i => i.type === 'estructurado').map(i => i.img);
  pendientesNoEstructurados = icons.filter(i => i.type === 'noestructurado').map(i => i.img);
  gameLoop();
});

restartButton.addEventListener('click', () => {
  clearInterval(gameInterval);
  points = 0;
  lives = 3;
  updateLivesBar();
  document.getElementById('points').textContent = points;
  crosshairX = window.innerWidth / 2 - 20;
  crosshairY = window.innerHeight / 2 - 20;
  updateCrosshairPosition();
  pendientesEstructurados = icons.filter(i => i.type === 'estructurado').map(i => i.img);
  pendientesNoEstructurados = icons.filter(i => i.type === 'noestructurado').map(i => i.img);
  gameLoop();
});

function showIcon() {
  if (lives <= 0) return;

  const randomObj = icons[Math.floor(Math.random() * icons.length)];
  currentIconType = randomObj.type;

  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 100);

  icon.style.left = `${x}px`;
  icon.style.top = `${y}px`;
  icon.style.backgroundImage = `url('${randomObj.img}')`;
  icon.style.display = 'block';
  iconActive = true;
}

function hideIcon() {
  icon.style.display = 'none';
  iconActive = false;
}

function gameLoop() {
  clearInterval(gameInterval);
  gameInterval = setInterval(() => {
    if (lives > 0 && !iconActive) {
      showIcon();
    }
  }, 1000);
}

function checkMissionComplete() {
  if (pendientesEstructurados.length === 0 && pendientesNoEstructurados.length === 0) {
    clearInterval(gameInterval);
    document.getElementById('missionComplete').style.display = 'block';
  }
}

function updateCrosshairPosition() {
  crosshair.style.left = `${crosshairX}px`;
  crosshair.style.top = `${crosshairY}px`;
}

document.addEventListener('keydown', (e) => {
  if (gameScreen.style.display === 'block') {
    const moveAmount = 10;

    if (e.code === 'ArrowLeft') crosshairX -= moveAmount;
    if (e.code === 'ArrowRight') crosshairX += moveAmount;
    if (e.code === 'ArrowUp') crosshairY -= moveAmount;
    if (e.code === 'ArrowDown') crosshairY += moveAmount;

    crosshairX = Math.max(0, Math.min(window.innerWidth - 40, crosshairX));
    crosshairY = Math.max(0, Math.min(window.innerHeight - 40, crosshairY));

    updateCrosshairPosition();

    if (iconActive && (e.code === 'Space' || e.code === 'Enter')) {
      const crossRect = crosshair.getBoundingClientRect();
      const iconRect = icon.getBoundingClientRect();

      const isOverlap = !(
        crossRect.right < iconRect.left ||
        crossRect.left > iconRect.right ||
        crossRect.bottom < iconRect.top ||
        crossRect.top > iconRect.bottom
      );

      const iconName = icon.style.backgroundImage.replace(/^url\(["']?/, '').replace(/["']?\)$/, '');

      if (isOverlap) {
        if (e.code === 'Space' && currentIconType === 'estructurado') {
          points += 10;
          document.getElementById('points').textContent = points;
          successSound.play();
          const index = pendientesEstructurados.indexOf(iconName);
          if (index !== -1) pendientesEstructurados.splice(index, 1);
          hideIcon();
          checkMissionComplete();
        } else if (e.code === 'Enter' && currentIconType === 'noestructurado') {
          points += 10;
          document.getElementById('points').textContent = points;
          successSound.play();
          const index = pendientesNoEstructurados.indexOf(iconName);
          if (index !== -1) pendientesNoEstructurados.splice(index, 1);
          hideIcon();
          checkMissionComplete();
        } else {
          lives--;
          errorSound.play();
          updateLivesBar();
          hideIcon();
          if (lives <= 0) {
            clearInterval(gameInterval);
            alert('GAME OVER');
          }
        }
      } else {
        lives--;
        errorSound.play();
        updateLivesBar();
        if (lives <= 0) {
          clearInterval(gameInterval);
          alert('GAME OVER');
        }
      }
    }
  }
});

function updateLivesBar() {
  const fill = document.getElementById('livesFill');
  const percent = (lives / 3) * 100;
  fill.style.width = percent + '%';
}
</script>
</body>
</html>
