<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Probando 4 M4 - Protocolo Centinela</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Orbitron', sans-serif;
      color: #00ffff;
      background: #000;
      overflow: hidden;
    }
    .pantalla {
      display: none;
      width: 100vw;
      height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .pantalla.activa {
      display: flex;
    }
    #bienvenida, #instrucciones {
      background: #000;
      text-align: center;
    }
    #bienvenida h1, #bienvenida p, #instrucciones h1 {
      text-shadow: 0 0 10px #00ffff;
    }
    #bienvenida h1 { font-size: 36px; margin-bottom: 20px; }
    #bienvenida p { font-size: 20px; margin-bottom: 20px; }
    #bienvenida input, #bienvenida button, #instrucciones button {
      font-size: 18px;
      padding: 10px;
      margin: 15px;
      border: 2px solid #00ffff;
      background: #111;
      color: #00ffff;
      border-radius: 8px;
    }
    #bienvenida button:hover, #instrucciones button:hover {
      background: #00ffff;
      color: #000;
      cursor: pointer;
    }
    #panel-juego {
      background: rgba(0, 0, 0, 0.6);
      padding: 20px;
      border-radius: 12px;
      border: 2px solid #00ffff;
      box-shadow: 0 0 15px #00ffff;
      max-width: 800px;
      width: 90%;
      text-align: center;
    }
    #panelInstrucciones {
      background-color: rgba(0,0,0,0.8);
      padding: 20px;
      border: 2px solid #00ffff;
      border-radius: 12px;
      max-width: 800px;
      box-shadow: 0 0 10px #00ffff;
      text-align: justify;
    }
    .parrafo {
      margin-bottom: 20px;
      border-left: 3px solid #00ffff;
      padding-left: 10px;
      font-size: 18px;
      line-height: 1.6;
    }
    .boton-nivel {
      display: inline-block;
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      background: transparent;
      color: #00ffff;
      border: 2px solid #00ffff;
      border-radius: 10px;
      text-shadow: 0 0 5px #00ffff;
      cursor: pointer;
    }
    .boton-nivel:disabled {
      opacity: 0.3;
      cursor: default;
    }
    .boton-nivel:hover:enabled {
      background: #00ffff;
      color: #000;
    }
    #panel-superior {
      position: absolute;
      top: 20px;
      left: 20px;
      background: #000;
      padding: 10px;
      border: 2px solid #00ffff;
      border-radius: 10px;
      text-align: left;
      box-shadow: 0 0 10px #00ffff;
    }
    #botonesNiveles {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div id="bienvenida" class="pantalla activa">
    <h1>Bienvenido</h1>
    <p>Ingresa tu nombre para iniciar la misión:</p>
    <input type="text" id="nombreCadete" placeholder="Nombre del Cadete">
    <button onclick="iniciarMision()">INICIAR</button>
  </div>
  <div id="instrucciones" class="pantalla">
    <h1>Cadete <span id="nombreCadeteInstrucciones"></span></h1>
    <div id="panelInstrucciones">
      <div id="parrafo1" class="parrafo"></div>
      <div id="parrafo2" class="parrafo"></div>
      <div id="parrafo3" class="parrafo"></div>
      <button id="botonIniciarJuego" onclick="mostrarPantallaDeNiveles()" style="display:none">Iniciar Desafío</button>
    </div>
  </div>
  <div id="niveles" class="pantalla">
    <div id="panel-superior">
      <div>Cadete: <span id="nombreSuperior"></span></div>
      <div>Puntos: <span id="puntosSuperior">0</span></div>
      <div>Progreso: <span id="progresoSuperior">0%</span></div>
    </div>
    <div id="panel-juego">
      <h2>Completa en orden los niveles del desafío</h2>
      <div id="botonesNiveles"></div>
      <button id="botonDiploma" style="display:none" onclick="alert('Diploma')">Ver Diploma</button>
    </div>
  </div>
<script>
const parrafos = [
  "Con EPRE restaurado y la red sensorial funcionando, el sistema está listo para operar en su máxima capacidad.",
  "Pero se detectan intentos de acceso no autorizado.",
  "Debes activar el Protocolo Centinela para blindar a EPRE de amenazas digitales."
];

function escribirParrafo(index, id, cb) {
  const texto = parrafos[index];
  const el = document.getElementById(id);
  let i = 0;
  el.textContent = '';
  const intv = setInterval(() => {
    if (i < texto.length) {
      el.textContent += texto[i++];
    } else {
      clearInterval(intv);
      if (cb) setTimeout(cb, 500);
    }
  }, 50);
}

function animarInstrucciones() {
  escribirParrafo(0, 'parrafo1', () => {
    escribirParrafo(1, 'parrafo2', () => {
      escribirParrafo(2, 'parrafo3', () => {
        document.getElementById('botonIniciarJuego').style.display = 'inline-block';
      });
    });
  });
}

function iniciarMision() {
  const nombre = document.getElementById('nombreCadete').value.trim();
  if (!nombre) return;
  localStorage.setItem('nombreCadete', nombre);
  localStorage.setItem('nivelDesbloqueado', 1);
  document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
  document.getElementById('instrucciones').classList.add('activa');
  document.getElementById('nombreCadeteInstrucciones').textContent = nombre;
  animarInstrucciones();
}

function mostrarPantallaDeNiveles() {
  const nombre = localStorage.getItem('nombreCadete');
  const nivel = parseInt(localStorage.getItem('nivelDesbloqueado')) || 1;
  const puntos = Math.min((nivel - 1) * 20, 100);
  document.getElementById('nombreSuperior').textContent = nombre;
  document.getElementById('puntosSuperior').textContent = puntos;
  document.getElementById('progresoSuperior').textContent = `${puntos}%`;
  document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
  document.getElementById('niveles').classList.add('activa');

  const botones = document.getElementById('botonesNiveles');
  botones.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    const btn = document.createElement('button');
    btn.textContent = `Nivel ${i}`;
    btn.className = 'boton-nivel';
    btn.disabled = i > nivel;
    btn.onclick = () => {
      window.location.href = `https://cgviviana.github.io/AndinaCode-X/AndinaCode-X/Mision/Mision4/Desafio1/Nivel${i}/`;
    };
    botones.appendChild(btn);
  }
  if (nivel > 5) document.getElementById('botonDiploma').style.display = 'inline-block';
}

window.onload = () => {
  const hash = window.location.hash;
  const nombre = localStorage.getItem('nombreCadete');
  const nivel = parseInt(localStorage.getItem('nivelDesbloqueado')) || 1;
  if (hash === "#niveles" && nombre) {
    mostrarPantallaDeNiveles();
  } else if (nombre) {
    document.getElementById('nombreCadeteInstrucciones').textContent = nombre;
    document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
    document.getElementById('instrucciones').classList.add('activa');
    animarInstrucciones();
  }
};
</script>
</body>
</html>
